version: "3.8"

services:

  postgres:
    image: postgres:15
    container_name: hrms_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hrms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: hrms_backend
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    env_file:
      - .env

volumes:
  postgres_data: